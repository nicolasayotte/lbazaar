services:
    app:
        image: lebazaar-app-staging:latest
        ports:
            - 80:80
            - 443:443
        volumes:
            - /var/.secrets/.env.staging:/app/.env:ro
            - ./nginx/vhost.conf:/opt/docker/etc/nginx/vhost.conf:ro
            - /var/log/app:/app/storage/logs
            - /var/log/nginx/:/var/log/nginx
        environment:
            LOG_STDOUT: '/var/log/nginx/access.log'
            LOG_STDERR: '/var/log/nginx/error.log'
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
            interval: 30s
            timeout: 3s
            start_period: 40s
            retries: 3
        deploy:
            resources:
                limits:
                    cpus: '1.5'
                    memory: 1.5G
                reservations:
                    cpus: '0.25'
                    memory: 256M

# Local Production-Like Testing Environment
# Purpose: Test with production Docker image before deploying to staging
# Usage: See docs/LOCAL_PROD_TESTING.md

services:
  app:
    build:
      context: .
      dockerfile: docker-build/Dockerfile.production
    image: lebazaar-app-local-prod:latest
    ports:
      - '8080:80'
      - '5173:5173'  # Vite dev server (if needed)
    volumes:
      # Mount storage for logs and uploads (development convenience)
      - './storage/logs:/app/storage/logs'
      - './storage/app:/app/storage/app'
      # Mount .env for local config
      - './.env:/app/.env:ro'
    environment:
      # Override for local testing
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=learning_bazaar
      - DB_USERNAME=sail
      - DB_PASSWORD=password
    networks:
      - local-prod
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  mysql:
    image: 'mysql:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'  # Use 3307 to avoid conflict with Sail
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: 'learning_bazaar'
      MYSQL_USER: 'sail'
      MYSQL_PASSWORD: 'password'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'local-prod-mysql:/var/lib/mysql'
    networks:
      - local-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-ppassword"]
      retries: 3
      timeout: 5s

networks:
  local-prod:
    driver: bridge

volumes:
  local-prod-mysql:
    driver: local
